<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沖縄旅行🌺</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
}

html {
  background: linear-gradient(to bottom, #00c6ff, #0072ff);
  background-attachment: fixed;
  transition: background 1s ease;
}

body {
  font-family: sans-serif;
  color: white;
  text-align: center;
  padding: 20px;
}

body.ocean {
  background: linear-gradient(to bottom, #87cefa, #00bfff);
}

button {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  background: white;
  color: #0072ff;
  font-weight: bold;
}

.section {
  display: none;
}

.card {
  background: rgba(255,255,255,0.2);
  padding: 15px;
  border-radius: 20px;
  margin-top: 20px;
  text-align: left;
}

.back {
  background: #ffdd57;
  color: black;
}

.schedule {
  list-style: none;
  padding: 0;
  margin: 0;
}

.schedule li {
  margin: 6px 0;
}

.schedule .title {
  margin: 18px 0 8px 0;   
  font-weight: bold;
}

.schedule input[type="checkbox"] {
  transform: scale(1.2);
  margin-right: 8px;
}

.schedule input[type="checkbox"]:checked + span {
  text-decoration: line-through;
  opacity: 0.6;
}

.checkbox-space {
  display: inline-block;
  width: 24px;   
}

/* 🎉 コンプリート表示 */
.celebrate {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 6vw;             /* 画面幅に応じて文字サイズ */
  max-font-size: 40px;        /* 最大サイズ */
  animation: pop 1s ease;
  z-index: 100;
  text-align: center;
  white-space: nowrap;         /* 折り返さず1行 */
  overflow: hidden;
  max-width: 90%;              /* 画面幅に収める */
}

@keyframes pop {
  0% { transform: translate(-50%, -50%) scale(0); }
  60% { transform: translate(-50%, -50%) scale(1.3); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>

<body>

<h1>🌺 沖縄旅行 🌺</h1>

<!-- 🏠 ホーム -->
<div id="home">
  <button onclick="showSection('scheduleMenu')">🕒 タイムスケジュール</button>
  <button onclick="showSection('access')">🚗 アクセス</button>
  <button onclick="showSection('spots')">📍 スポット紹介</button>
</div>

<!-- 🕒 スケジュール選択画面 -->
<div id="scheduleMenu" class="section card">
  <h2>🕒 タイムスケジュール</h2>
  <button onclick="showSection('day1')">🌴 1日目</button>
  <button onclick="showSection('day2')">🌊 2日目</button>
  <button onclick="showSection('day3')">🌞 3日目</button>
  <button onclick="showSection('day4')">🌅 4日目</button>
  <button class="back" onclick="goHome()">戻る</button>
</div>

<!-- 🌴 1日目 -->
<div id="day1" class="section card">
  <h2>🌴 1日目</h2>

  <ul class="schedule">
    <li class="title">🚃 あいの風鉄道で小松駅へ出発</li>
    <li><span class="checkbox-space"></span><span>10:50 富山駅発</span></li>
    <li><span class="checkbox-space"></span><span>11:00 小杉駅発</span></li>
    <li><label><input type="checkbox" id="d1-3"><span>11:08 高岡駅発</span></label></li>
    <li><label><input type="checkbox" id="d1-4"><span>11:49 金沢駅到着</span></label></li>
    <li><label><input type="checkbox" id="d1-5"><span>12:00 金沢駅発</span></label></li>
    <li><label><input type="checkbox" id="d1-6"><span>12:34 小松駅到着</span></label></li>
    <li>👭 徒歩で小松駅前<br>
        <a href="https://www.google.com/maps/dir/?api=1&destination=小松駅前&travelmode=walking" target="_blank">徒歩ルートを見る</a>
    </li>
    <li class="title">🚌 バスで小松空港へ</li>
    <li><label><input type="checkbox" id="d1-7"><span>13:25 小松駅前発</span></label></li>
    <li><label><input type="checkbox" id="d1-8"><span>13:40 小松空港バス停到着</span></label></li>
    <li>👭 徒歩で小松空港へ<br>
        <a href="https://www.google.com/maps/dir/?api=1&destination=小松空港&travelmode=walking" target="_blank">徒歩ルートを見る</a>
    </li>
    <li><label><input type="checkbox" id="d1-9"><span>13:45 小松空港到着</span></label></li>
    <li class="title">🌺 沖縄へGO!! 🌺</li>
    <li><label><input type="checkbox" id="d1-10"><span>14:15 小松空港発</span></label></li>
    <li><label><input type="checkbox" id="d1-11"><span>16:55 那覇空港到着 🌴🌺✨</span></label></li>
    <li><label><input type="checkbox" id="d1-12"><span>17:45~18:00 無料シャトルで空港からホテルへ</span></label></li>
    <li><label><input type="checkbox" id="d1-13"><span>19:00~19:15 無料シャトルで国際通り</span></label></li>
    <li><label><input type="checkbox" id="d1-14"><span>国際通り観光🏙</span></label></li>
  </ul>

  <button class="back" onclick="showSection('scheduleMenu')">戻る</button>
</div>

<script>
// チェック保存＋背景＆文字表示
document.querySelectorAll('input[type="checkbox"]').forEach(box => {
  if (localStorage.getItem(box.id) === "true") box.checked = true;
  box.addEventListener("change", () => {
    localStorage.setItem(box.id, box.checked);
    checkAllCompleted();
  });
});

function checkAllCompleted() {
  const day = document.getElementById("day1");
  const checkboxes = day.querySelectorAll('input[type="checkbox"]');
  const allChecked = [...checkboxes].every(cb => cb.checked);

  if (allChecked && !day.classList.contains("done")) {
    day.classList.add("done");

    // 背景を水色に
    document.body.classList.add("ocean");

    // 🎉 文字表示（自動縮小して一行に）
    const div = document.createElement("div");
    div.className = "celebrate";
    div.textContent = "🌺 1日目コンプリート！お疲れさま！";
    document.body.appendChild(div);

    // JSで画面幅に収まるよう自動縮小
    let fontSize = parseInt(window.getComputedStyle(div).fontSize);
    while (div.scrollWidth > window.innerWidth * 0.9 && fontSize > 10) {
      fontSize--;
      div.style.fontSize = fontSize + "px";
    }

    setTimeout(() => div.remove(), 3000); 
    setTimeout(() => document.body.classList.remove("ocean"), 3000); 
  }
}

function showSection(id) {
  document.getElementById("home").style.display = "none";
  document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
  document.getElementById(id).style.display = "block";
}

function goHome() {
  document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
  document.getElementById("home").style.display = "block";
}
</script>

</body>
</html>
