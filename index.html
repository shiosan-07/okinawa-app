<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沖縄旅行🌺</title>

<style>


html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
}

html {
  background: linear-gradient(to bottom, #00c6ff, #0072ff);
}

body {
  font-family: sans-serif;
  background: linear-gradient(to bottom, #00c6ff, #0072ff);
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
}

button {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  background: white;
  color: #0072ff;
  font-weight: bold;
}

.section {
  display: none;
}

.card {
  background: rgba(255,255,255,0.2);
  padding: 15px;
  border-radius: 20px;
  margin-top: 20px;
  text-align: left;
}

.back {
  background: #ffdd57;
  color: black;
}
</style>
</head>

<body>

<h1>🌺 沖縄旅行 🌺</h1>

<!-- 🏠 ホーム -->
<div id="home">
  <button onclick="showSection('scheduleMenu')">🕒 タイムスケジュール</button>
  <button onclick="showSection('access')">🚗 アクセス</button>
  <button onclick="showSection('spots')">📍 スポット紹介</button>
</div>

<!-- 🕒 スケジュール選択画面 -->
<div id="scheduleMenu" class="section card">
  <h2>🕒 タイムスケジュール</h2>

  <button onclick="showSection('day1')">🌴 1日目</button>
  <button onclick="showSection('day2')">🌊 2日目</button>

  <button class="back" onclick="goHome()">戻る</button>
</div>

<!-- 🌴 1日目 -->
<div id="day1" class="section card">
  <h2>🌴 1日目</h2>
  <ul>
    <li>10:00 那覇空港到着</li>
    <li>12:00 国際通り</li>
    <li>18:00 ホテルチェックイン</li>
  </ul>

  <button class="back" onclick="showSection('scheduleMenu')">戻る</button>
</div>

<!-- 🌊 2日目 -->
<div id="day2" class="section card">
  <h2>🌊 2日目</h2>
  <ul>
    <li>09:00 美ら海水族館</li>
    <li>15:00 古宇利島</li>
  </ul>

  <button class="back" onclick="showSection('scheduleMenu')">戻る</button>
</div>

<!-- 🚗 アクセス -->
<div id="access" class="section card">
  <h2>🚗 アクセス</h2>
  <p>美ら海水族館までのルート</p>
  <a href="https://www.google.com/maps/dir/?api=1&destination=美ら海水族館" target="_blank">
    Googleマップで開く
  </a>

  <br><br>

  <p>古宇利島までのルート</p>
  <a href="https://www.google.com/maps/dir/?api=1&destination=古宇利島" target="_blank">
    Googleマップで開く
  </a>

  <br><br>
  <button class="back" onclick="goHome()">戻る</button>
</div>

<!-- 📍 スポット紹介 -->
<div id="spots" class="section card">
  <h2>📍 スポット紹介</h2>

  <p>美ら海水族館</p>
  <a href="https://churaumi.okinawa/" target="_blank">
    公式サイトを見る
  </a>

  <br><br>

  <p>古宇利島</p>
  <a href="https://kourijima.info/" target="_blank">
    観光情報を見る
  </a>

  <br><br>
  <button class="back" onclick="goHome()">戻る</button>
</div>

<script>

function showSection(id) {
  document.getElementById("home").style.display = "none";
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

function goHome() {
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "none";
  });
  document.getElementById("home").style.display = "block";
}

</script>

</body>
</html>
